name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint, typecheck, test, and build the Next.js application.
  # ─────────────────────────────────────────────────────────────────────────
  lint-typecheck-build:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bun is used for package management and running scripts.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      # Node is needed by some Prisma CLI operations (the Prisma CLI itself
      # runs on Node even when invoked via bunx).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      # Apply every migration to a fresh SQLite DB. This catches broken
      # migration SQL at PR time, independent of whether a test happens to
      # exercise the affected table. Production deploys run the same command
      # at container start (see docker/Dockerfile CMD), so a failure here
      # means the image would have failed to boot.
      - name: Migrate sanity check
        run: bunx prisma migrate deploy
        env:
          SLOTTY_DATABASE_URL: "file:./ci-migrate-check.db"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          SLOTTY_DATABASE_URL: "file:./test.db"

      - name: Build
        run: bun run build
        env:
          # Provide dummy but structurally valid values so any build-time env
          # validation passes without real secrets being present in CI.
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
          SLOTTY_PUBLIC_URL: "http://localhost:3000"
          # 32 random bytes encoded as base64 (44 chars with padding).
          SLOTTY_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          # 64 random bytes encoded as base64 (88 chars with padding).
          SLOTTY_SESSION_SECRET: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=="
          SLOTTY_DATABASE_URL: "file:./test.db"

  # ─────────────────────────────────────────────────────────────────────────
  # Static security audit — runs the grep-based checks in
  # scripts/audit-security.ts. Catches obvious regressions: admin routes
  # without csrf()/requireUser(), public POSTs without rate limits, raw
  # console.* in production code, etc.
  # ─────────────────────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: lint-typecheck-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun run audit:security

  # ─────────────────────────────────────────────────────────────────────────
  # Playwright E2E tests. Boots a production build of the app, seeds a
  # disposable SQLite DB, and runs the booking + admin auth flows.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    env:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      SLOTTY_PUBLIC_URL: "http://127.0.0.1:3010"
      SLOTTY_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      SLOTTY_SESSION_SECRET: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=="

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/.report
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Verify the Docker image builds cleanly (no push — just a smoke test).
  # Only runs on direct pushes to main, not on pull requests, to avoid
  # burning runner minutes on every PR while still catching Dockerfile issues
  # before they reach production.
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: slotty/slotty:ci
          # Use GitHub Actions cache to speed up layer reuse across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
