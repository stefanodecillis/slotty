name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint, typecheck, test, and build the Next.js application.
  # ─────────────────────────────────────────────────────────────────────────
  lint-typecheck-build:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bun is used for package management and running scripts.
      - name: Set up Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: "1.3.x"

      # Node is needed by some Prisma CLI operations (the Prisma CLI itself
      # runs on Node even when invoked via bunx).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          SLOTTY_DATABASE_URL: "file:./test.db"

      - name: Build
        run: bun run build
        env:
          # Provide dummy but structurally valid values so any build-time env
          # validation passes without real secrets being present in CI.
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
          SLOTTY_PUBLIC_URL: "http://localhost:3000"
          # 32 random bytes encoded as base64 (44 chars with padding).
          SLOTTY_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          # 64 random bytes encoded as base64 (88 chars with padding).
          SLOTTY_SESSION_SECRET: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=="
          SLOTTY_DATABASE_URL: "file:./test.db"

  # ─────────────────────────────────────────────────────────────────────────
  # Verify the Docker image builds cleanly (no push — just a smoke test).
  # Only runs on direct pushes to main, not on pull requests, to avoid
  # burning runner minutes on every PR while still catching Dockerfile issues
  # before they reach production.
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: slotty/slotty:ci
          # Use GitHub Actions cache to speed up layer reuse across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
