name: Release

# Publishes the Docker image to GHCR on every push to main.
#
# The Docker build itself runs `next build` inside the Dockerfile, so a broken
# typecheck or compile error fails the build and prevents a bad image from
# being tagged `:latest`. The CI workflow (lint / unit tests / E2E) still runs
# in parallel and surfaces issues, but it does not gate publication — that's
# the docker build's job.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/slotty
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
